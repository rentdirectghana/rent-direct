<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | Therent Direct Ghana</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-viewport { min-height: calc(100vh - 90px); display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; background: radial-gradient(circle at 10% 10%, #111827 0%, var(--bg-deep) 80%); }
        .premium-auth-card { background: rgba(18, 25, 38, 0.65); border: 1px solid var(--border-luxury); border-radius: 20px; width: 100%; max-width: 540px; padding: 4rem 3.5rem; backdrop-filter: blur(16px); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7); }
        .auth-editorial-header { text-align: center; margin-bottom: 3rem; }
        .auth-editorial-title { font-size: 2.6rem; color: var(--text-pure); }
        .form-dual-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .form-field-group { margin-bottom: 1.75rem; position: relative; }
        .luxury-field-label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.6rem; }
        .luxury-input-field { width: 100%; background: rgba(9, 13, 22, 0.65); border: 1px solid rgba(212, 175, 55, 0.15); padding: 1.1rem 1.25rem; border-radius: 8px; color: var(--text-pure); font-size: 0.95rem; outline: none; }
        .password-input-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
        .password-input-wrapper .luxury-input-field { padding-right: 3.5rem; }
        .btn-toggle-vision { position: absolute; right: 1.25rem; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; }
        .action-feedback-box { margin-top: 1.5rem; font-size: 0.85rem; text-align: center; padding: 0.85rem; border-radius: 6px; display: none; }
        .auth-footer-navigator { text-align: center; margin-top: 2.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer-navigator a { color: var(--gold-primary); text-decoration: none; }
        @media (max-width: 576px) { .form-dual-row { grid-template-columns: 1fr; } }
    </style>
    <!-- Lightweight, optimized production bundle library link -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <nav class="lux-navbar"><a href="properties.html" class="lux-logo">Therent Direct <span>Ghana</span></a></nav>
    <div class="auth-viewport">
        <div class="premium-auth-card">
            <header class="auth-editorial-header"><h1 class="auth-editorial-title">Create Account</h1></header>
            <form id="premium-signup-form" onsubmit="executeUserRegistrationPipeline(event)">
                <div class="form-dual-row">
                    <div class="form-field-group"><label class="luxury-field-label">First Name</label><input type="text" id="reg-firstname" class="luxury-input-field" placeholder="Kwame" required></div>
                    <div class="form-field-group"><label class="luxury-field-label">Last Name</label><input type="text" id="reg-lastname" class="luxury-input-field" placeholder="Mensah" required></div>
                </div>
                <div class="form-field-group"><label class="luxury-field-label">Phone Number</label><input type="tel" id="reg-phone" class="luxury-input-field" placeholder="e.g. 0244736657" minlength="10" maxlength="10" required></div>
                <div class="form-field-group"><label class="luxury-field-label">Email Address</label><input type="email" id="reg-email" class="luxury-input-field" placeholder="name@domain.com" required></div>
                <div class="form-field-group">
                    <label class="luxury-field-label">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="reg-password" class="luxury-input-field" placeholder="••••••••" minlength="6" required>
                        <button type="button" class="btn-toggle-vision" onclick="togglePasswordVisionInterface(this)">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn-luxury" style="width: 100%; padding: 1.1rem;">Create Account</button>
                <div id="pipeline-feedback" class="action-feedback-box"></div>
            </form>
            <p class="auth-footer-navigator">Already have an account? <a href="login.html">Sign In</a></p>
        </div>
    </div>
    <script>
        var client = supabase.createClient("https://supabase.co", "sb_publishable_9ezOuadFGRZfHWCChMhVUA_huKgJSr-");
        
        function togglePasswordVisionInterface(btn) {
            var input = document.getElementById("reg-password");
            if (input.type === "password") { input.type = "text"; btn.innerText = "🙈"; } 
            else { input.type = "password"; btn.innerText = "👁️"; }
        }

        async function executeUserRegistrationPipeline(event) {
            event.preventDefault();
            var fb = document.getElementById('pipeline-feedback');
            var fName = document.getElementById('reg-firstname').value.trim();
            var lName = document.getElementById('reg-lastname').value.trim();
            var phone = document.getElementById('reg-phone').value.trim();
            var email = document.getElementById('reg-email').value.trim();
            var password = document.getElementById('reg-password').value;

            fb.style.display = "block"; fb.style.background = "rgba(212, 175, 55, 0.1)"; fb.style.color = "var(--gold-primary)"; fb.innerText = "Creating account tokens...";

            try {
                var signupResult = await client.auth.signUp({ email: email, password: password });
                if (signupResult.error) {
                    fb.style.background = "rgba(239, 68, 68, 0.1)"; fb.style.color = "var(--danger)"; fb.innerText = signupResult.error.message; return;
                }
                if (signupResult.data.user) {
                    localStorage.setItem("trd_user_id", signupResult.data.user.id);
                    await client.from('users').insert([{ id: signupResult.data.user.id, full_name: fName + " " + lName, email: email, phone_number: phone, role: 'tenant', has_premium_access: false }]);
                    fb.style.background = "rgba(16, 185, 129, 0.1)"; fb.style.color = "var(--success)"; fb.innerText = "Success! Transferring...";
                    setTimeout(function() { window.location.href = "properties.html"; }, 1500);
                }
            } catch (err) { fb.innerText = "Error encountered. Try again."; }
        }
    </script>
</body>
</html>
