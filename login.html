<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Therent Direct Ghana</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-viewport { min-height: calc(100vh - 90px); display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; background: radial-gradient(circle at 90% 10%, #111827 0%, var(--bg-deep) 80%); }
        .premium-auth-card { background: rgba(18, 25, 38, 0.65); border: 1px solid var(--border-luxury); border-radius: 20px; width: 100%; max-width: 460px; padding: 4rem 3.5rem; backdrop-filter: blur(16px); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7); }
        .auth-editorial-header { text-align: center; margin-bottom: 3rem; }
        .auth-editorial-title { font-size: 2.6rem; color: var(--text-pure); letter-spacing: -0.01em; }
        .form-field-group { margin-bottom: 1.75rem; position: relative; }
        .luxury-field-label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.6rem; font-weight: 500; }
        .luxury-input-field { width: 100%; background: rgba(9, 13, 22, 0.65); border: 1px solid rgba(212, 175, 55, 0.15); padding: 1.1rem 1.25rem; border-radius: 8px; color: var(--text-pure); font-size: 0.95rem; outline: none; }
        .password-input-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
        .password-input-wrapper .luxury-input-field { padding-right: 3.5rem; }
        .btn-toggle-vision { position: absolute; right: 1.25rem; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; z-index: 10; }
        .action-feedback-box { margin-top: 1.5rem; font-size: 0.85rem; text-align: center; padding: 0.85rem; border-radius: 6px; display: none; line-height: 1.4; }
        .auth-footer-navigator { text-align: center; margin-top: 2.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer-navigator a { color: var(--gold-primary); text-decoration: none; }
    </style>
    <!-- Lightweight, optimized production bundle library link -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>
    <nav class="lux-navbar"><a href="properties.html" class="lux-logo">Therent Direct <span>Ghana</span></a></nav>
    <div class="auth-viewport">
        <div class="premium-auth-card">
            <header class="auth-editorial-header">
                <h1 class="auth-editorial-title">Welcome Back</h1>
            </header>
            <form id="login-form" onsubmit="executeLogin(event)">
                <div class="form-field-group">
                    <label class="luxury-field-label">Email Address</label>
                    <input type="email" id="login-email" class="luxury-input-field" placeholder="name@domain.com" required>
                </div>
                <div class="form-field-group">
                    <label class="luxury-field-label">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="login-password" class="luxury-input-field" placeholder="••••••••" required>
                        <button type="button" class="btn-toggle-vision" onclick="togglePasswordVisionInterface(this)">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn-luxury" style="width: 100%; padding: 1.1rem;">Sign In</button>
                <div id="form-feedback" class="action-feedback-box"></div>
            </form>
            <p class="auth-footer-navigator">Don't have an account? <a href="signup.html">Create Account</a></p>
        </div>
    </div>
    <script>
        var client = supabase.createClient("https://supabase.co", "sb_publishable_9ezOuadFGRZfHWCChMhVUA_huKgJSr-");
        
        function togglePasswordVisionInterface(btn) {
            var input = document.getElementById("login-password");
            if (input.type === "password") { input.type = "text"; btn.innerText = "🙈"; } 
            else { input.type = "password"; btn.innerText = "👁️"; }
        }

        async function executeLogin(event) {
            event.preventDefault();
            var msg = document.getElementById("form-feedback");
            var email = document.getElementById("login-email").value.trim();
            var password = document.getElementById("login-password").value;

            msg.style.display = "block";
            msg.style.background = "rgba(212, 175, 55, 0.1)";
            msg.style.color = "var(--gold-primary)";
            msg.innerText = "Authenticating credentials...";

            try {
                var authResult = await client.auth.signInWithPassword({ email: email, password: password });
                if (authResult.error) {
                    msg.style.background = "rgba(239, 68, 68, 0.1)"; msg.style.color = "var(--danger)";
                    msg.innerText = authResult.error.message; return;
                }
                if (authResult.data.user) {
                    localStorage.setItem("trd_user_id", authResult.data.user.id);
                    var profileQuery = await client.from("users").select("*").eq("id", authResult.data.user.id).single();
                    if (profileQuery.data && profileQuery.data.role === "admin") { window.location.href = "admin.html"; } 
                    else { window.location.href = "properties.html"; }
                }
            } catch (err) { msg.innerText = "System delayed. Please try again."; }
        }
    </script>
</body>
</html>
