        .card-price-overlay { position: absolute; bottom: 1rem; left: 1rem; background: rgba(9, 13, 22, 0.85); padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--gold-primary); font-weight: 700; color: var(--text-pure); font-size: 1.1rem; }
